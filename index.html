<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="10000">
    <meta name="description" content="Lark-Shop">
    <meta name="author" content="Anderson-Olororoso">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/component.css">
    <link rel="stylesheet" href="css/responsive.css">
    <title>Lark-Shop</title>
</head>
<body>
    <header class="header h-index">
        <nav>
            <input type="checkbox" id="menu-toggle" class="menu-toggle">
        
                <!-- ✅ Label = botón hamburguesa visual -->
                <label for="menu-toggle" class="burguer" aria-label="Menú">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
            <div class="mobile-menu">
                    <!-- Título del menú -->
                    <div class="menu-header">
                        <h2>Lark Shop</h2>
                    </div>
                    <a href="">Carrito</a>
                    <a href="">Catálogo</a>
                    <a href="">Checkout</a>
                    <a href="">Historial</a>
                    <a href="">Perfil</a>
                    <a href="">Producto</a>
                </div>
            <div>
                <h1>Lark Shop</h1>
            </div>
            <img src="img/carrito.png" alt="">
        </nav>
        <div class="search">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input type="text" class="search-input" placeholder="Buscar productos, marcas...">
        </div>
    </header>
    <main class="main m-index">
        <h2>Categorias populares</h2>
        <section>
            <div>
                <img src="img/icon-abrigo.png" alt="Icono de la opcion abrigo">
                <p>Abrigos</p>
            </div>
            <div>
                <img src="img/icon-camisa.png" alt="Icono de la opcion camisas">
                <p>Camisetas</p>
            </div>
            <div>
                <img src="img/icon-jeans.svg" alt="Imagen de la opcion jeans">
                <p>Pantalones</p>
            </div>
        </section>
        <h2>Novedades para ti</h2>
        <article class="novedades">
            <div>
                <img src="img/chaqueta.png" alt="Imagen de chaqueta">
                <p>Chaqueta cafe de cuero</p>
                <p id="precio">$120.00</p>
            </div>
            <div>
                <img src="img/camiseta.png" alt="Imagen de camiseta grafica">
                <p>Camiseta grafica</p>
                <p id="precio">$35.00</p>
            </div>
            <div>
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ7IonNg5ZJX-ppkJv7tFl192n5kcczmVPC_A&s" alt="Imagen de Jeans">
                <p>Jeans clasicos</p>
                <p id="precio">$75.00</p>
            </div>
            <div>
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS6qZiHtD4cTmr2fzg1fuzcC8bxR_kMOYzgSQ&s" alt="Imagen de Zapatilla retro">
                <p>Zapatillas retro</p>
                <p id="precio">$90.00</p>
            </div>
        </article>
    </main>
</body>
</html>
