<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="10000">
    <meta name="description" content="Lark-Shop">
    <meta name="author" content="Anderson-Olororoso">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/component.css">
    <link rel="stylesheet" href="css/responsive.css">
    <title>Catálogo</title>
</head>
<body>
    <header class="header h-catalogo">
        <nav>
            <div class="back">
                <a href="index.html">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </a>
            </div>
            <div>
                <h1>Lark Shop</h1>
            </div>
            <img src="img/carrito.png" alt="">
        </nav>
        <div class="options">
            <button class="btn">Talla <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            <button class="btn">Color <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            <button class="btn">Precio <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </div>
    </header>
    <main class="main m-catalogo">
        <section>
           <div>
                <img src="img/camisola-guate.jpg" alt="Camisola de Guatemala">
                <p>Camisola de Guatemala</p>
                <p id="precio">$50.99</p>
            </div>
            <div>
                <img src="https://organicblank.com/cdn/shop/collections/PS_NS305_DRIFTWOOD_2_f6d1c4b9-49f0-46b6-9405-50916b75a856.png?v=1756325013" alt="Imagen camisa organica">
                <p>Camisa Organica</p>
                <p id="precio">$24.99</p>
            </div>
            <div>
                <img src="https://suemp.com/wp-content/uploads/2024/05/gorra-sport-01.jpg" alt="Imagen gorra deportiva">
                <p>Gorra deportiva</p>
                <p id="precio">$19.99</p>
            </div>
            <div>
                <img src="https://d2j6dbq0eux0bg.cloudfront.net/images/13467108/products/528478514/4074956884.jpg" alt="Imagen de mochila resistente">
                <p>Mochila resistente</p>
                <p id="precio">$45.00</p>
            </div>
            <div>
                <img src="https://media.glamour.es/photos/660d76aff4b82e1215ab6c89/master/w_1024%2Cc_limit/botella%2520chili.jpg" alt="Imagen de botella reutilizable">
                <p>Botella reutilizable</p>
                <p id="precio">$15.50</p>
            </div>
            <div>
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSWy1sJX5x3iXmgJdzMeVWZGpizs9wPI2tQAA&s" alt="Imagen Libreta ecologica">
                <p>Libeta ecologica</p>
                <p id="precio">$12.00</p>
            </div>
        </section>
    </main>
</body>
</html>
