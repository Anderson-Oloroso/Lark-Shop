<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="10000">
    <meta name="description" content="Lark-Shop">
    <meta name="author" content="Anderson-Olororoso">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/component.css">
    <link rel="stylesheet" href="css/responsive.css">
    <title>Carrito</title>
</head>
<body>
    <header class="header h-carrito">
        <a href="">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a> 
        <h1>Mi carrtito (3)</h1>
    </header>
    <main class="main m-carrito">
        <article>
            <div>
                <img src="https://casadelosgigantes.com/cdn/shop/files/tazaceramicabuho2_1445x.jpg?v=1700167512" alt="Imagen de taza ceramia">
                <div class="contenido">
                    <p id="prod">Taza ceramica</p>
                    <p id="subt">Ref:#SKU12345</p>
                    <div class="cantidad">
                        <button>-</button><span>1</span><button>+</button>
                    </div>
                </div>
                <div class="eliminar">
                    <button class="btn-eliminar" style="color: #e53e3e; background: none; border: none; cursor: pointer;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></svg>
                    </button>
                    <div class="total">
                        <p id="precio">$25.00</p>
                        <p id="subt">Subtotal</p>
                    </div>
                </div>
            </div>
        </article>
        <article>
            <div>
                <img src="https://m.media-amazon.com/images/I/61Heb13fQQL._AC_UY1000_.jpg" alt="Imagen de sudadera gris con capucha">
                <div class="contenido">
                    <p id="prod">Sudadera Gris </p>
                    <p id="subt">Ref:#SKU12345</p>
                    <div class="cantidad">
                        <button>-</button><span>1</span><button>+</button>
                    </div>
                </div>
                <div class="eliminar">
                    <button class="btn-eliminar" style="color: #e53e3e; background: none; border: none; cursor: pointer;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></svg>
                    </button>
                    <div class="total">
                        <p id="precio">$85.00</p>
                        <p id="subt">Subtotal</p>
                    </div>
                </div>
            </div>
        </article>
        <article>
            <div>
                <img src="https://d2j6dbq0eux0bg.cloudfront.net/images/13467108/products/528478514/4074956889.jpg" alt="Imagen de mochila resistente">
                <div class="contenido">
                    <p id="prod">Mochila resistente</p>
                    <p id="subt">Ref:#SKU12345</p>
                    <div class="cantidad">
                        <button>-</button><span>1</span><button>+</button>
                    </div>
                </div>
                <div class="eliminar">
                    <button class="btn-eliminar" style="color: #e53e3e; background: none; border: none; cursor: pointer;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></svg>
                    </button>
                    <div class="total">
                        <p id="precio">$95.00</p>
                        <p id="subt">Subtotal</p>
                    </div>
                </div>
            </div>
        </article>
        <section> 
            <div>
                <p>Subtotal</p>
                <p id="precio">$205.00</p>
            </div>
            <div>
                <p>Impuestos</p>
                <p id="precio">$23.33</p>
            </div>
            <div class="total">
                <p>Total</p>
                <p id="precio">$248.33</p>
            </div>
        <button id="pago">Proceder al pago</button>
        </section>
    </main>
</body>
</html>
